<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />

    <style>
        @page {
            size: A4;
            margin: 5mm;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 15px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            page-break-inside: auto;
        }

        thead {
            display: table-header-group;
        }

        tr {
            page-break-inside: avoid;
            page-break-after: auto;
        }

        th, td {
            border: 1px solid #000;
            padding: 6px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h1>Relatório de Pontuação</h1>
<p style="text-align: center;">
    <strong>Categoria: </strong><span th:text="${categoria}"></span> | <strong>Fase: </strong><span th:text="${fase}"></span>
</p>

<table>
    <thead>
    <tr>
        <th>Posição</th>
        <th>Competidor</th>
        <th>Situação</th>
        <th>Partidas</th>
        <th>Nota Individual</th>
        <th>Nota Dupla</th>
        <th>Total</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${dados}">
        <td th:text="${item.posicao + '°'}"></td>

        <td th:text="${item.numeroCompetidor != null
                    ? '(' + item.numeroCompetidor + ')' + item.competidor
                    : item.competidor}">
        </td>

        <td th:text="${item.situacao}"></td>

        <td th:text="${item.partidasConcluidas + ' de ' + item.partidas}"></td>

        <td th:text="${#numbers.formatDecimal(item.notaIndividual, 1, 2)}"></td>
        <td th:text="${#numbers.formatDecimal(item.notaDupla, 1, 2)}"></td>
        <td>
            <span th:text="${#numbers.formatDecimal(item.total, 1, 2)}"></span>
            <span
                th:if="${item.totalDesempate != null and item.totalDesempate >= 0}"
                style="color: red; font-weight: bold;"
                th:text="| ${#numbers.formatDecimal(item.totalDesempate, 1, 2)}+|">
            </span>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
